<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4c7b39" />
    <title>Canopy · לימודים למבחנים</title>

    <!-- Paint the right theme on the first frame. The cloud doc is the source
         of truth and loads after auth; until then use the last-known values
         cached in localStorage so there is no flash of the default palette. -->
    <script>
      try {
        var r = document.documentElement,
          t = localStorage.getItem('canopy-theme'),
          m = localStorage.getItem('canopy-mode') || 'auto'
        if (t) r.dataset.theme = t
        var dark = m === 'dark' || (m === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches)
        r.dataset.mode = dark ? 'dark' : 'light'
      } catch (e) {}
    </script>
    <meta name="description" content="המסלול שלך דרך תקופת המבחנים: משימות לפי קורס, שיבוץ אוטומטי ותכנון שבועי." />

    <!-- Installable web app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" />
    <!-- iOS ignores the manifest: it needs its own icon and standalone hints. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Canopy" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
